<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="panel" style="max-width: 520px; margin: 48px auto;">
    <section class="card form-card">
      <p class="eyebrow">Recuperação de senha</p>
      <h2>Definir nova senha</h2>
      <p class="muted">Conta: {{ user.name }}</p>
      <form method="post" autocomplete="off">
        <label>Nova senha
          <input name="password" type="password" placeholder="Digite a nova senha" required autocomplete="new-password" value="">
        </label>
        <button class="primary-btn" type="submit">Atualizar senha</button>
      </form>
    </section>
  </main>
</body>
</html>
